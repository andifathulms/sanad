services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sanad
      POSTGRES_USER: sanad
      POSTGRES_PASSWORD: sanad_dev
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanad"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://sanad:sanad_dev@db:5432/sanad
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build: ./backend
    command: celery -A config worker -l info -Q default,graph,analytics
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgres://sanad:sanad_dev@db:5432/sanad
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on: [redis, db]

  celery_beat:
    build: ./backend
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    environment:
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on: [redis]

  frontend:
    build: ./frontend
    command: npm run dev
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    depends_on: [backend]

volumes:
  postgres_data:
